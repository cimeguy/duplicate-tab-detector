<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    font-size: 13px;
    color: #222;
    background: #fafafa;
  }
  header {
    background: linear-gradient(90deg, #ff6b35, #ff9a5c);
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header span { font-size: 12px; opacity: .85; }
  #list { padding: 10px 12px 12px; }
  .group {
    margin-bottom: 12px;
    border: 1px solid #f0d0c0;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
  }
  .group-header {
    background: #fff5f0;
    padding: 6px 10px;
    font-size: 11px;
    color: #b05020;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-bottom: 1px solid #f0d0c0;
  }
  .tab-row {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    gap: 7px;
    border-bottom: 1px solid #f5f5f5;
    cursor: pointer;
    transition: background .1s;
  }
  .tab-row:last-child { border-bottom: none; }
  .tab-row:hover { background: #fff5f0; }
  .tab-row img { width: 14px; height: 14px; flex-shrink: 0; }
  .tab-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #333;
    font-size: 12px;
  }
  .tab-idx {
    flex-shrink: 0;
    font-size: 10px;
    color: #aaa;
  }
  .empty {
    text-align: center;
    color: #aaa;
    padding: 28px 0;
    font-size: 13px;
  }
  .tip {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    padding: 0 0 10px;
  }
</style>
</head>
<body>
<header>
  <h1>⚠ 重复标签</h1>
  <span id="summary">检测中…</span>
</header>
<div id="list"></div>
<script src="popup.js"></script>
</body>
</html>
